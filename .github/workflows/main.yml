name: ETH VWAP Bot
on:
  schedule:
    - cron: '*/5 * * * *' 
  workflow_dispatch: 

env:
  # Forces all actions to use the newer Node.js 24 runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6 # Upgraded to v6

      - name: Set up Python
        uses: actions/setup-python@v6 # Upgraded to v6
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py
